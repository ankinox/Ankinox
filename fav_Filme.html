    <title>Meine Favoriten - Ankinox</title>

    <style>
        /* Entfernt den blauen Klick-Effekt auf mobilen Geräten überall */
        * {
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body { margin: 0; padding-bottom: 90px; background-color: #050505; color: white; font-family: sans-serif; }
        
        .banner {
            position: fixed; top: 0; left: 0; width: 100%; height: 60vh;

        }

            position: absolute;
            top: -6px;
            left: 15px;
            z-index: 10;
        }

        .banner-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4); 
        }

        .content {
            margin-top: 45vh; 
            background: linear-gradient(to bottom, rgba(5,5,5,0) 0%, #050505 5%, #050505 100%);
            padding: 20px;
            position: relative;
        }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background-color: #0a0a0a; display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #333; z-index: 9999; 
        }
        .bottom-nav a { color: #555; text-decoration: none; font-size: 1.2rem; }
    </style>
</head>

    <div class="banner">

                    ⇄ Syncro

                </div>
