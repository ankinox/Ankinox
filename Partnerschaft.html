<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Partner werden bei Ankinox</title>

    <style>
        body { margin: 0; padding-bottom: 90px; background-color: #050505; color: white; font-family: sans-serif; }
        
        .banner {
            position: fixed; top: 0; left: 0; width: 100%; height: 60vh;
            background-image: url('https://ankinox.wordpress.com/wp-content/uploads/2026/07/lv_0_202607061608551723013789651408983.jpg');
            background-size: cover; background-position: center; z-index: -1;
        }

        .banner-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 5, 5, 0.4); /* Etwas dunkler, damit es besser mit dem Schwarz verschmilzt */
        }

        .content {
            /* Das ist der entscheidende Wert: Er bestimmt, wo der Inhalt unter dem Banner beginnt */
            margin-top: 45vh; 
            /* Der Verlauf sorgt für den sanften Übergang zum schwarzen Hintergrund */
            background: linear-gradient(to bottom, rgba(5,5,5,0) 0%, #050505 30%, #050505 100%);
            padding: 20px;
            position: relative;
        }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background-color: #0a0a0a; display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #333; z-index: 9999; 
        }
        .bottom-nav a { color: #555; text-decoration: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="banner">
        <div class="banner-overlay"></div>
    </div>

    <div class="content">
        <img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_00000000035871f499d3f138bff8e98b379938916723128019.png" 
             style="width: 100%; max-width: 225px; display: block; margin: -100px auto 20px auto;">

        <div style="text-align: center;">
            <div style="color: #bbb; margin-bottom: 25px;">
                <span style="border: 1px solid #7000ff; padding: 4px 12px; border-radius: 8px; font-weight: bold; color: #00d4ff;">FSK 16</span>
            </div>
            
            <p>Wir arbeiten mit starken Partnern zusammen:</p>
            </div>
    </div>
    </body>
</html>
