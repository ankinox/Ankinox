<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream - Ankinox</title>
    <style>
        body { margin: 0; padding-bottom: 90px; background-color: #050505; color: white; font-family: sans-serif; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 9999; }
        .bottom-nav a { color: #555; text-decoration: none; font-size: 1.2rem; }
        .bottom-nav a#nav-stream { color: #bf00ff; } /* Aktiv-Zustand */
    </style>
</head>
<body>

    <!-- Banner-Bereich -->
    <div id="banner-container" style="background-color:#050505;color:white;font-family:sans-serif;padding:0;position:relative;width:100%;height:60vh;overflow:hidden">
        <img id="banner-img" src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_000000006e8871f4a74e47a18c61618d4664144619533045072.png" style="width: 100%;height: 100%;object-fit: cover;object-position: center center;position: absolute;top: 0;left: 0;z-index: 1">
        <div style="position:absolute;bottom:0;left:0;right:0;height:100%;background:linear-gradient(to top,#050505 0%,transparent 60%);z-index:2"></div>
        <div style="position:absolute;top:0px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:20px;z-index:10">
            <img src="https://ankinox.wordpress.com/wp-content/uploads/2026/06/file_00000000fae07246aee954a7e9b9ef573991694793848018843.png" style="width: 50px">
            <div style="color:#ffffff;font-size:24px">🔍</div>
        </div>
        <!-- Content Box -->
        <div style="position:absolute;bottom:-55px;left:30px;z-index:3;max-width:500px">
            <img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_00000000d13071f49b02e87cff4df2111868918513011359622.png" style="display: block;width: 100%;max-width: 150px;margin-left: -20px;margin-bottom: -70px">
            <div style="color:#bbb;font-size:13px;margin-bottom:12px">
                <span style="border:2px solid #7000ff;padding:1px 6px;border-radius:4px;font-weight:bold;color:#00d4ff;box-shadow:0 0 5px #00d4ff">FSK 0</span> Untertitel | Synchro • Kurzfilm • Drama
            </div>
            <p id="banner-text" style="font-size:14px;margin-bottom:15px;opacity:0.9;line-height:1.4;max-width:90%">Poretto ist ein Mädchen, das alleine ist und niemanden hat, bis sie auf einen magischen Stuhl trifft, der ihr verhilft, Freunde zu finden.</p>
            <div style="display:flex;gap:10px;margin-bottom:10px;align-items:center;">
                <a href="#" style="padding: 8px 20px;background: linear-gradient(90deg, #7000ff, #00d4ff);color: #ffffff;text-decoration: none;border-radius: 50px;font-weight: bold;">▶ Anschauen</a>
            </div>
        </div>
    </div>

    <!-- Dein restlicher Content (Kategorien etc.) bleibt hier unverändert -->
    <!-- ... -->

    <!-- Navigation -->
    <nav class="bottom-nav">
        <a href="index.html">Start</a>
        <a href="stream.html" id="nav-stream">Stream</a>
        <a href="#">Shop</a>
        <a href="#">Partner</a>
    </nav>

    <script>
        const bannerData = [
            { img: "URL_VOM_BILD_1.png", text: "Text für Film 1" },
            { img: "URL_VOM_BILD_2.png", text: "Text für Film 2" }
        ];
        let currentIdx = 0;
        const bannerImg = document.getElementById('banner-img');
        
        function changeBanner(next) {
            currentIdx = next ? (currentIdx + 1) % bannerData.length : (currentIdx - 1 + bannerData.length) % bannerData.length;
            bannerImg.src = bannerData[currentIdx].img;
        }

        // Auto-Wechsel alle 5 Sek
        setInterval(() => changeBanner(true), 5000);

        // Swipe-Logik
        let startX;
        document.getElementById('banner-container').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('banner-container').addEventListener('touchend', e => {
            let diff = e.changedTouches[0].clientX - startX;
            if (Math.abs(diff) > 50) changeBanner(diff < 0);
        });
    </script>
</body>
</html>
