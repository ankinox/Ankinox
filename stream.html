<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream - Ankinox</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; padding-bottom: 90px; background-color: #050505; color: white; font-family: sans-serif; }
        
        /* CSS für sauberes Snapping beim manuellen Wischen */
        .scroll-container { 
            display: flex; 
            overflow-x: auto; 
            gap: 20px; 
            padding: 0 30px 10px 30px; 
            scrollbar-width: none; 
            scroll-snap-type: x mandatory; 
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        .cat-item, .fav-placeholder { scroll-snap-align: start; flex: 0 0 140px; }
        
        /* ... restliches CSS ... */
        .category-link { color: white; text-decoration: none; font-size: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; margin-top: 30px; }
        .dot { flex: 1; height: 5px; background: rgba(255,255,255,0.4); border-radius: 2.5px; overflow: hidden; position: relative; cursor: pointer; }
        .dot.active { cursor: default; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #7000ff, #00d4ff); position: absolute; top: 0; left: 0; pointer-events: none; }
        .fav-placeholder-img { width: 140px; height: 200px; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .fav-placeholder-img img { width: 100%; height: 100%; object-fit: cover; }
        .add-plus-placeholder { flex: 0 0 140px; height: 200px; border: 1px dashed #555; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #555; }
        @keyframes load { from { width: 0%; } to { width: 100%; } }
    </style>
</head>
<body>
    <!-- ... (Banner-Bereich bleibt gleich) ... -->
    <div style="background-color: #050505; padding: 10px 0;">
        <h2 style="padding: 0 30px; font-size: 20px;">Mediathek</h2>
        <div class="scroll-container" id="mediathek-carousel">
            <div class="cat-item"><a href="Film.html"><img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_0000000001007246baa1811535dce7ff6896339926578093836.png" style="width: 140px; height: 200px; border-radius: 8px;"></a><p>Alle Filme</p></div>
            <div class="cat-item"><a href="Serien.html"><img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_000000008cac71f4912ec5893c9dc7507153328058856750682.png" style="width: 140px; height: 200px; border-radius: 8px;"></a><p>Alle Serien</p></div>
            <div class="cat-item"><a href="Musik.html"><img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_0000000001c471f48650d13b46e731186595649778490613677.png" style="width: 140px; height: 200px; border-radius: 8px;"></a><p>Alles an Musik</p></div>
        </div>
    </div>

    <script>
        const mediathek = document.getElementById('mediathek-carousel');
        let requestId, resumeTimeout;

        function startCarousel() {
            function animate() {
                // Geschwindigkeit 0.2
                mediathek.scrollLeft += 0.2;
                
                // Teleportation: Nur wenn komplett außerhalb
                if (mediathek.scrollLeft >= mediathek.firstElementChild.offsetWidth + 20) {
                    mediathek.appendChild(mediathek.firstElementChild);
                    mediathek.scrollLeft = 0;
                }
                requestId = requestAnimationFrame(animate);
            }
            requestId = requestAnimationFrame(animate);
        }

        // Starte sofort
        startCarousel();

        // Nutzer greift ein: Animation stoppen
        mediathek.addEventListener('scroll', () => {
            cancelAnimationFrame(requestId);
            clearTimeout(resumeTimeout);
            // Nach 3s Inaktivität wieder starten
            resumeTimeout = setTimeout(startCarousel, 3000);
        }, { passive: true });
    </script>
</body>
</html>
