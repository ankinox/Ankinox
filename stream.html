<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream - Ankinox</title>
    <style>
        body { margin: 0; padding-bottom: 90px; background-color: #050505; color: white; font-family: sans-serif; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 9999; }
        .bottom-nav a { color: #555; text-decoration: none; font-size: 1.2rem; }
        
        /* Indikator-Styling */
        .dot { flex: 1; height: 5px; background: rgba(255,255,255,0.3); border-radius: 2.5px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #7000ff, #00d4ff); transition: none; }
        
        /* Die Animation für den Ladebalken */
        @keyframes load {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>

    <script>
        const data = [/* ... deine Daten ... */];
        
        let idx = 0;
        function updateBanner(i) {
            idx = i;
            // Banner-Inhalt aktualisieren
            document.getElementById('banner-bg').src = data[idx].bg;
            document.getElementById('banner-logo').src = data[idx].logo;
            document.getElementById('banner-fsk').innerHTML = data[idx].fsk;
            document.getElementById('banner-desc').innerText = data[idx].desc;
            document.getElementById('banner-button-link').href = data[idx].url;
            
            // Balken-Animation neu starten
            document.querySelectorAll('.progress-bar').forEach((bar, index) => {
                bar.style.animation = 'none'; // Stoppt laufende Animation
                bar.style.width = '0%';       // Setzt zurück
                
                if (index === idx) {
                    // Trigger Reflow (wichtig, damit der Browser die Animation neu erkennt)
                    bar.offsetHeight; 
                    bar.style.animation = 'load 5s linear forwards';
                }
            });
        }

        setInterval(() => updateBanner((idx + 1) % data.length), 5000);
        updateBanner(0);
    </script>
</body>
</html>
