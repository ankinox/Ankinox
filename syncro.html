<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchronisieren</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; padding-bottom: 90px; background-color: #050505; color: white; font-family: sans-serif; }
        
        .banner {
            position: fixed; top: 0; left: 0; width: 100%; height: 60vh;
            background-image: url('https://ankinox.wordpress.com/wp-content/uploads/2026/07/17836718839938699554614244236644.png');
            background-size: cover; background-position: center; z-index: -1;
        }
        .banner-logo { position: absolute; top: -6px; left: 15px; z-index: 10; }
        .banner-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); }

        .content { margin-top: 35vh; background: linear-gradient(to bottom, rgba(5,5,5,0) 0%, #050505 15%); padding: 20px; position: relative; }
        .fav-container { display: flex; gap: 15px; overflow-x: auto; padding-top: 10px; }
        .device-card { flex: 0 0 140px; height: 200px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; position: relative; }
        .add-plus-placeholder { flex: 0 0 140px; height: 200px; border: 1px dashed #555; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #555; cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 80%; max-width: 300px; }
    </style>
</head>
<body>

    <div class="banner">
        <div class="banner-logo"><img src="https://ankinox.wordpress.com/wp-content/uploads/2026/06/file_00000000fae07246aee954a7e9b9ef573991694793848018843.png" style="width: 100px;"></div>
        <div class="banner-overlay"></div>
    </div>

    <div id="codeModal" class="modal">
        <div class="modal-content">
            <div id="modal-body">
                <p id="modal-text">Code eingeben:</p>
                <div id="input-area">
                    <input type="text" id="groupCode" maxlength="5" placeholder="00000" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; text-align: center; font-size: 1.5rem;">
                    <button onclick="confirmCode()" style="color: #00d4ff; background: none; border: 1px solid #00d4ff; padding: 5px 20px; border-radius: 20px; cursor: pointer;">Verbinden</button>
                </div>
                <div id="timer-display" style="color: #888; margin-top: 10px; font-size: 0.9rem;"></div>
                <div id="action-area" style="margin-top:15px;">
                    <button onclick="closeModal()" style="color: #555; background: none; border: none; cursor: pointer;">Abbrechen</button>
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        <img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_00000000f73071f480d0d392f975801b1757380589434620822.png" style="width: 100%; max-width: 325px; display: block; margin: -30px auto 20px auto;">

        <div style="text-align: center; margin-top: -20px;">
            <div style="display: flex; justify-content: center; margin-bottom: 15px;">
                <a href="#" id="mainButton" onclick="handleButtonClick()" style="text-decoration: none; color: #00d4ff; border: 2px solid #00d4ff; padding: 10px 30px; border-radius: 50px; font-weight: bold; cursor: pointer;">
                   Code eingeben
                </a>
            </div>
            <div style="color: #cccccc; font-size: 0.95rem; margin-bottom: 30px;">
                Synchronisiere dein Gerät mit einem 60-Sekunden-Code. Voraussetzung: beide Geräte befinden sich im selben Router Netzwerk.
            </div>

            <div style="text-align: left;">
                <h2 style="font-size: 20px; margin-bottom: 15px;">Synchronisierte Geräte</h2>
                <div class="fav-container" id="device-list">
                    <div class="add-plus-placeholder" onclick="startPairingProcess()">+</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onerror = function(msg, url, line) { alert("Systemfehler: " + msg); };
        
        let myDeviceId = localStorage.getItem('anki_device_id') || 'dev_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('anki_device_id', myDeviceId);
        let myDeviceType = /Mobi|Android/i.test(navigator.userAgent) ? '📱 Handy' : '💻 PC/Tablet';

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof supabase === 'undefined') { alert("Netzwerkfehler: Bibliothek konnte nicht geladen werden."); return; }
            window.supabaseInstance = supabase.createClient(
                'https://kynhrpdxhkjaeeexalje.supabase.co', 
                'sb_publishable_lnmQ267x9hH4sdGN3FZxKg_6INmbnPQ'
            );
            checkSession();
        });

        let isGrouped = false, dbEntryId = null, currentAnkiGroup = "", pairingPoller = null, countdownInterval = null;
        let isProcessing = false;
        let initialDeviceCount = 0;

        async function getPublicIPv4() {
            const res = await fetch('https://api4.ipify.org?format=json');
            const data = await res.json();
            if(!data.ip) throw new Error("IP-Adresse konnte nicht verifiziert werden.");
            return data.ip;
        }

        function showStatus(message, isError = false) {
            isProcessing = false;
            clearInterval(countdownInterval);
            clearTimeout(pairingPoller);
            document.getElementById('modal-text').innerHTML = `<span style="color: ${isError ? '#ff4444' : '#00d4ff'}">${message}</span>`;
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('timer-display').style.display = 'none';
            document.getElementById('action-area').innerHTML = '<button onclick="closeModal()" style="color: white; border: 1px solid #555; padding: 5px 20px; border-radius: 20px; cursor: pointer;">OK</button>';
        }

        async function checkSession() {
            const { data, error } = await window.supabaseInstance
                .from('active_sessions')
                .select('group_name')
                .eq('device_id', myDeviceId)
                .maybeSingle();

            const lastKnownGroup = localStorage.getItem('last_known_group');

            if (data) {
                currentAnkiGroup = data.group_name;
                isGrouped = true;
                localStorage.setItem('last_known_group', currentAnkiGroup);
                
                document.getElementById('mainButton').innerText = "Gruppe: " + currentAnkiGroup;
                
                window.supabaseInstance.channel('group_' + currentAnkiGroup)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'active_sessions' }, () => location.reload())
                    .subscribe();

                updateDeviceList();
            } else {
                isGrouped = false;
                currentAnkiGroup = "";
                document.getElementById('mainButton').innerText = "Code eingeben";
                
                if (lastKnownGroup) {
                    alert("Hinweis: Du wurdest aus der Gruppe " + lastKnownGroup + " entfernt.");
                    localStorage.removeItem('last_known_group');
                }
                
                updateDeviceList();
            }
        }

        async function updateDeviceList() {
            const list = document.getElementById('device-list');
            if (!isGrouped) {
                list.innerHTML = `<div class="add-plus-placeholder" onclick="startPairingProcess()">+</div>`;
                return;
            }
            
            const { data: devices } = await window.supabaseInstance
                .from('active_sessions')
                .select('device_id, device_type')
                .eq('group_name', currentAnkiGroup);

            let html = "";
            if (devices) {
                // Sortierung: Das eigene Gerät immer nach vorne
                devices.sort((a, b) => (a.device_id === myDeviceId ? -1 : (b.device_id === myDeviceId ? 1 : 0)));

                devices.forEach(d => {
                    const isMe = d.device_id === myDeviceId;
                    html += `<div class="device-card">
                                <p>${d.device_type || '❓'}<br><small>${isMe ? 'Du' : 'Partner'}</small></p>
                                ${!isMe ? `<button onclick="removeDevice('${d.device_id}')" style="background:#ff4444; border:none; color:white; border-radius:5px; padding:5px 10px; cursor:pointer;">X</button>` : `<button onclick="leaveGroup()" style="background:#444; border:none; color:white; border-radius:5px; padding:5px 10px; cursor:pointer;">Verlassen</button>`}
                            </div>`;
                });
            }
            html += `<div class="add-plus-placeholder" onclick="startPairingProcess()">+</div>`;
            list.innerHTML = html;
        }

        async function handleDeviceRemoval(idToRemove, targetGroup) {
            await window.supabaseInstance.from('active_sessions').delete().eq('device_id', idToRemove);
            
            const { data: remaining } = await window.supabaseInstance
                .from('active_sessions')
                .select('device_id')
                .eq('group_name', targetGroup);
            
            if (!remaining || remaining.length <= 1) {
                await window.supabaseInstance.from('active_sessions').delete().eq('group_name', targetGroup);
            }
            
            location.reload();
        }

        async function removeDevice(id) {
            if(confirm("Gerät aus der Gruppe entfernen?")) {
                await handleDeviceRemoval(id, currentAnkiGroup);
            }
        }

        async function leaveGroup() { 
            if(confirm("Gruppe verlassen?")) { 
                await handleDeviceRemoval(myDeviceId, currentAnkiGroup);
            } 
        }

        function resetModalUI() {
            isProcessing = false;
            clearInterval(countdownInterval);
            clearTimeout(pairingPoller);
            document.getElementById('action-area').innerHTML = '<button onclick="closeModal()" style="color: #555; background: none; border: none; cursor: pointer;">Abbrechen</button>';
            document.getElementById('input-area').style.display = 'block';
            document.getElementById('timer-display').style.display = 'block';
            document.getElementById('groupCode').value = "";
            document.getElementById('modal-text').innerText = "Code eingeben:";
        }

        async function startPairingProcess() {
            if (isProcessing) return;
            isProcessing = true;

            const modal = document.getElementById('codeModal');
            modal.style.display = 'flex';
            document.getElementById('modal-text').innerText = "Erstelle Code...";
            document.getElementById('input-area').style.display = 'none';

            try {
                const myIp = await getPublicIPv4();
                let code = Math.floor(10000 + Math.random() * 90000).toString();
                
                if (isGrouped && currentAnkiGroup) {
                    const { data: existingDevices } = await window.supabaseInstance
                        .from('active_sessions')
                        .select('device_id')
                        .eq('group_name', currentAnkiGroup);
                    initialDeviceCount = existingDevices ? existingDevices.length : 1;
                } else {
                    initialDeviceCount = 0;
                }

                const metaPackage = JSON.stringify({
                    id: myDeviceId,
                    type: myDeviceType,
                    ip: myIp,
                    fallbackName: currentAnkiGroup
                });

                const { data, error: groupErr } = await window.supabaseInstance.from('groups').insert([{ 
                    group_key: code, 
                    group_name: metaPackage, 
                    status: 'active',
                    created_at: new Date().toISOString()
                }]).select().single();

                if (groupErr) throw groupErr;
                dbEntryId = data.id;

                let timeLeft = 60;
                document.getElementById('timer-display').innerText = `Code gültig für: ${timeLeft}s`;
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer-display').innerText = `Code gültig für: ${timeLeft}s`;
                    if (timeLeft <= 0) closeModal();
                }, 1000);

                document.getElementById('modal-text').innerHTML = "Dein Code:<br><strong style='font-size:2rem; color:#00d4ff;'>" + code + "</strong>";

                pairingPoller = setTimeout(pollPairingStatus, 1500);

            } catch (err) {
                showStatus("Fehler: " + err.message, true);
            }
        }

        async function pollPairingStatus() {
            if (!dbEntryId) return;

            try {
                if (isGrouped && currentAnkiGroup) {
                    const { data: devices } = await window.supabaseInstance
                        .from('active_sessions')
                        .select('device_id')
                        .eq('group_name', currentAnkiGroup);
                    
                    if (devices && devices.length > initialDeviceCount) {
                        document.getElementById('timer-display').style.display = 'none';
                        document.getElementById('modal-text').innerHTML = "<span style='color:#00d4ff; font-weight:bold;'>Neues Gerät verbunden!<br>Aktualisiere...</span>";
                        setTimeout(() => location.reload(), 1500);
                        return;
                    }
                } else {
                    const { data: session } = await window.supabaseInstance
                        .from('active_sessions')
                        .select('group_name')
                        .eq('device_id', myDeviceId)
                        .maybeSingle();

                    if (session) {
                        document.getElementById('timer-display').style.display = 'none';
                        document.getElementById('modal-text').innerHTML = "<span style='color:#00d4ff; font-weight:bold;'>Verbindung erfolgreich!<br>Lade Daten...</span>";
                        setTimeout(() => location.reload(), 1500);
                        return;
                    }
                }

                pairingPoller = setTimeout(pollPairingStatus, 1500);
            } catch (e) {
                pairingPoller = setTimeout(pollPairingStatus, 1500);
            }
        }

        async function confirmCode() {
            if (isProcessing) return;
            isProcessing = true;

            try {
                const input = document.getElementById('groupCode').value.trim();
                if (!input) throw new Error("Bitte gib einen Code ein.");

                const myIp = await getPublicIPv4();

                const { data: groupData, error: groupErr } = await window.supabaseInstance
                    .from('groups')
                    .select('*')
                    .eq('group_key', input)
                    .eq('status', 'active')
                    .maybeSingle();

                if (groupErr) throw groupErr;
                if (!groupData) throw new Error("Code ungültig oder abgelaufen.");

                const creatorMeta = JSON.parse(groupData.group_name);

                if (creatorMeta.ip !== myIp) {
                    throw new Error("Sicherheits-Abbruch: Nicht dasselbe Router-Netzwerk.<br><br><small style='color:#aaa;'>Tipp: Schalte am Handy kurz mobile Daten (5G/LTE) oder VPN aus.</small>");
                }

                const { data: checkA } = await window.supabaseInstance.from('active_sessions').select('group_name').eq('device_id', creatorMeta.id).maybeSingle();
                const { data: checkB } = await window.supabaseInstance.from('active_sessions').select('group_name').eq('device_id', myDeviceId).maybeSingle();

                let targetGroup = null;
                if (checkA) {
                    targetGroup = checkA.group_name;
                } else if (checkB) {
                    targetGroup = checkB.group_name;
                } else if (creatorMeta.fallbackName) {
                    targetGroup = creatorMeta.fallbackName;
                }

                if (!targetGroup) {
                    const { data: allSessions } = await window.supabaseInstance.from('active_sessions').select('group_name');
                    const usedNumbers = allSessions ? allSessions.map(s => {
                        const parts = s.group_name.split('-');
                        return parts.length > 1 ? parseInt(parts[1]) || 0 : 0;
                    }) : [];
                    
                    let counter = 1;
                    while (usedNumbers.includes(counter)) {
                        counter++;
                    }
                    targetGroup = `Anki-${counter}`;
                }

                const { error: errA } = await window.supabaseInstance.from('active_sessions').upsert({ 
                    device_id: creatorMeta.id,
                    group_name: targetGroup, 
                    device_type: creatorMeta.type 
                }, { onConflict: 'device_id' });
                if (errA) throw errA;

                const { error: errB } = await window.supabaseInstance.from('active_sessions').upsert({ 
                    device_id: myDeviceId,
                    group_name: targetGroup, 
                    device_type: myDeviceType 
                }, { onConflict: 'device_id' });
                if (errB) throw errB;

                document.getElementById('input-area').style.display = 'none';
                document.getElementById('modal-text').innerHTML = "<span style='color:#00d4ff; font-weight:bold;'>Erfolgreich hinzugefügt!<br>Gruppe wird geladen...</span>";
                
                setTimeout(async () => {
                    await window.supabaseInstance.from('groups').delete().eq('id', groupData.id);
                    location.reload();
                }, 1500);

            } catch (err) {
                showStatus(err.message, true);
            }
        }

        async function closeModal() {
            isProcessing = false;
            clearTimeout(pairingPoller);
            clearInterval(countdownInterval);
            if (dbEntryId) { 
                await window.supabaseInstance.from('groups').delete().eq('id', dbEntryId); 
                dbEntryId = null;
            }
            document.getElementById('codeModal').style.display = 'none';
            resetModalUI();
        }

        function handleButtonClick() {
            if (!isGrouped) {
                resetModalUI();
                document.getElementById('codeModal').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
