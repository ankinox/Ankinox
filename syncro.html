<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchronisieren</title>
    <!-- Supabase-Client einbinden -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... Dein CSS bleibt wie gehabt ... */
    </style>
</head>
<body>

    <!-- (Dein HTML-Layout bleibt unverändert) -->

    <script>
        // TRAGE HIER DEINE DATEN EIN
        const supabase = supabase.createClient(
            'https://kynhrpdxhkjaeeexalje.supabase.co', 
            'sb_publishable_lnmQ267x9hH4sdGN3FZxKg_6INmbnPQ'
        );

        let isGrouped = false;
        let currentGroupId = null;

        // 1. Code generieren und an Server (Supabase) senden
        async function startPairingProcess() {
            const code = Math.floor(10000 + Math.random() * 90000).toString();
            const expires = new Date(Date.now() + 60000).toISOString();

            const { data, error } = await supabase.from('groups').insert([{ 
                group_key: code, 
                status: 'active', 
                expires_at: expires
            }]).select().single();

            if (error) return alert("Server-Fehler");
            currentGroupId = data.id;

            document.getElementById('modal-text').innerHTML = "Dein 60-Sekunden-Code:<br><strong style='font-size:2rem; color:#00d4ff;'>" + code + "</strong>";
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('codeModal').style.display = 'flex';
        }

        // 2. Code an Server senden und Validierung abwarten
        async function confirmCode() {
            const input = document.getElementById('groupCode').value;

            // Server-Prüfung: Existiert der Code und ist er aktiv?
            const { data, error } = await supabase
                .from('groups')
                .select('*')
                .eq('group_key', input)
                .eq('status', 'active')
                .single();

            if (data && new Date(data.expires_at) > new Date()) {
                // Verknüpfung: Status auf 'linked' setzen
                await supabase.from('groups').update({ status: 'linked' }).eq('id', data.id);
                
                isGrouped = true;
                document.getElementById('mainButton').innerText = "Anki-Schlüssel: " + data.group_key;
                updateDeviceList();
                closeModal();
                alert("Synchronisation erfolgreich!");
            } else {
                alert("Code abgelaufen oder ungültig. Bitte im selben WLAN prüfen.");
            }
        }

        // 3. Status bei Abbruch oder Ablauf an Server senden
        async function cancelSync() {
            if (currentGroupId) {
                await supabase.from('groups').update({ status: 'expired' }).eq('id', currentGroupId);
            }
            closeModal();
        }

        // ... (Die restlichen Funktionen updateDeviceList, leaveGroup etc. bleiben bei dir)
    </script>
</body>
</html>
