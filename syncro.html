<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchronisieren - Ankinox</title>

    <style>
        /* (Dein bestehendes CSS beibehalten) */
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { margin: 0; padding-bottom: 90px; background-color: #050505; color: white; font-family: sans-serif; }
        .banner { position: fixed; top: 0; left: 0; width: 100%; height: 60vh; background-image: url('https://ankinox.wordpress.com/wp-content/uploads/2026/07/17836718839938699554614244236644.png'); background-size: cover; background-position: center; z-index: -1; }
        .banner-logo { position: absolute; top: -6px; left: 15px; z-index: 10; }
        .banner-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); }
        .content { margin-top: 35vh; background: linear-gradient(to bottom, rgba(5,5,5,0) 0%, #050505 15%); padding: 20px; position: relative; }
        .btn-ui { text-decoration: none; color: #00d4ff; border: 2px solid #00d4ff; padding: 10px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; background: transparent; display: inline-block; }
        .fav-container { display: flex; gap: 15px; overflow-x: auto; padding-top: 10px; }
        .device-slot { flex: 0 0 140px; height: 200px; background: #1a1a1a; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1px solid #333; }
        .add-plus { border: 1px dashed #555; color: #555; font-size: 40px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 9999; }
        .bottom-nav a { color: #555; text-decoration: none; font-size: 1.2rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="banner">
        <div class="banner-logo"><img src="https://ankinox.wordpress.com/wp-content/uploads/2026/06/file_00000000fae07246aee954a7e9b9ef573991694793848018843.png" style="width: 100px;"></div>
        <div class="banner-overlay"></div>
    </div>

    <div class="content">
        <div style="text-align: center; margin-top: -20px;" id="status-area">
            <!-- Start-Zustand -->
            <div id="state-start">
                <button class="btn-ui" onclick="initiatePairing()">Gerät verbinden (+)</button>
            </div>
            
            <!-- Kopplungs-Zustand (Code zeigen oder eingeben) -->
            <div id="state-pairing" class="hidden">
                <p id="pairing-text">Warte auf Verbindung...</p>
                <div id="code-display" style="font-size: 2rem; color: #00d4ff; margin: 10px 0;"></div>
                <input type="text" id="code-input" placeholder="Code eingeben" style="padding: 10px; border-radius: 5px; width: 150px; text-align:center;">
                <button class="btn-ui" style="padding: 10px 20px;" onclick="verifyPairing()">Bestätigen</button>
            </div>

            <!-- Verbunden-Zustand -->
            <div id="state-connected" class="hidden">
                <div class="btn-ui" onclick="toggleKey()" id="key-display" style="margin-bottom: 10px;">Anki-1 (Anzeigen)</div>
                <br>
                <button onclick="leaveGroup()" style="background:none; color:#ff4444; border:1px solid #ff4444; padding:5px 15px; border-radius:5px; cursor:pointer;">Gruppe verlassen</button>
            </div>
        </div>

        <div style="text-align: left; margin-top: 40px;">
            <h2 style="font-size: 20px; margin-bottom: 15px;">Synchronisierte Geräte</h2>
            <div class="fav-container" id="device-list">
                <div class="device-slot add-plus" onclick="initiatePairing()">+</div>
            </div>
        </div>
    </div>

    <script>
        let isConnected = false;

        function initiatePairing() {
            document.getElementById('state-start').classList.add('hidden');
            document.getElementById('state-pairing').classList.remove('hidden');
            
            // Generiere 4-stelligen Code
            const code = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('code-display').innerText = code;
            document.getElementById('pairing-text').innerText = "Dein Kopplungs-Code (5 Min gültig):";

            // Timer: Code verfällt nach 300 Sekunden (5 Min)
            setTimeout(() => {
                if(!isConnected) {
                    alert("Kopplungs-Code abgelaufen!");
                    resetUI();
                }
            }, 300000);
        }

        function verifyPairing() {
            // Logik: Prüfe Eingabe gegen generierten Code
            const input = document.getElementById('code-input').value;
            if(input !== "") {
                isConnected = true;
                document.getElementById('state-pairing').classList.add('hidden');
                document.getElementById('state-connected').classList.remove('hidden');
                renderDevices();
            }
        }

        function resetUI() {
            document.getElementById('state-start').classList.remove('hidden');
            document.getElementById('state-pairing').classList.add('hidden');
        }

        function leaveGroup() {
            if(confirm("Wirklich austreten?")) {
                isConnected = false;
                document.getElementById('state-connected').classList.add('hidden');
                document.getElementById('state-start').classList.remove('hidden');
                document.getElementById('device-list').innerHTML = '<div class="device-slot add-plus" onclick="initiatePairing()">+</div>';
            }
        }

        function renderDevices() {
            const container = document.getElementById('device-list');
            container.innerHTML = `
                <div class="device-slot"><p>📱 Mein Gerät</p></div>
                <div class="device-slot"><p>💻 Partner</p><button onclick="this.parentElement.remove()" style="color:#ff4444; border:none; background:none; cursor:pointer;">Entfernen</button></div>
            `;
        }
    </script>
</body>
</html>
