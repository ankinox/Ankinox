<script>
    let isGrouped = false;
    let generatedCode = "";
    let pairingTimer, countdownInterval;

    // Speichert den originalen HTML-Zustand des Action-Bereichs
    const originalActionArea = `<button onclick="closeModal()" style="color: #555; background: none; border: none; cursor: pointer;">Abbrechen</button>`;

    function updateDeviceList() {
        const list = document.getElementById('device-list');
        if (isGrouped) {
            list.innerHTML = `
                <div class="device-card" onclick="leaveGroup()">
                    <p>📱 Mein Gerät (Host)<br><small>(Gruppe verlassen)</small></p>
                </div>
                <div class="device-card" onclick="kickDevice()">
                    <p>💻 Verbundenes Gerät<br><small>(Entfernen)</small></p>
                </div>
                <div class="add-plus-placeholder" onclick="startPairingProcess()">+</div>
            `;
        } else {
            list.innerHTML = `<div class="add-plus-placeholder" onclick="startPairingProcess()">+</div>`;
        }
    }

    function startPairingProcess() {
        generatedCode = Math.floor(10000 + Math.random() * 90000).toString();
        
        // Reset Modal UI
        document.getElementById('modal-text').innerHTML = "Dein 60-Sekunden-Code:<br><strong style='font-size:2rem; color:#00d4ff;'>" + generatedCode + "</strong>";
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('action-area').innerHTML = originalActionArea; // Immer Standard-Abbrechen
        document.getElementById('codeModal').style.display = 'flex';

        let timeRemaining = 60; 
        document.getElementById('timer-display').innerText = "Gültig für: 1:00 min";
        
        countdownInterval = setInterval(() => {
            timeRemaining--;
            let mins = Math.floor(timeRemaining / 60);
            let secs = timeRemaining % 60;
            document.getElementById('timer-display').innerText = `Gültig für: ${mins}:${secs < 10 ? '0'+secs : secs} sek`;
            if (timeRemaining <= 0) clearInterval(countdownInterval);
        }, 1000);

        pairingTimer = setTimeout(() => {
            generatedCode = ""; 
            document.getElementById('modal-text').innerHTML = "Code abgelaufen.";
            document.getElementById('timer-display').innerText = "";
            // Hier nutzen wir Buttons, die die Funktion startPairingProcess sauber neu aufrufen
            document.getElementById('action-area').innerHTML = `
                <button onclick="startPairingProcess()" style='color:#00d4ff; background:none; border:1px solid #00d4ff; padding:5px 20px; border-radius:20px; cursor:pointer;'>Neu generieren</button>
                <div style="margin-top:10px;"></div>
                <button onclick="closeModal()" style='color:#555; background:none; border:none; cursor:pointer;'>Abbrechen</button>
            `;
        }, 60000); 
    }

    function handleButtonClick() {
        if (!isGrouped) {
            document.getElementById('modal-text').innerText = "Code eingeben:";
            document.getElementById('input-area').style.display = 'block';
            document.getElementById('timer-display').innerText = "";
            document.getElementById('action-area').innerHTML = originalActionArea;
            document.getElementById('codeModal').style.display = 'flex';
        }
    }

    function confirmCode() {
        const input = document.getElementById('groupCode').value;
        // HINWEIS: Hier müsstest du später die Supabase-Logik einfügen, 
        // um den Code mit dem Server abzugleichen.
        if (generatedCode !== "" && input === generatedCode) {
            isGrouped = true;
            document.getElementById('mainButton').innerText = "Anki-Schlüssel: ANKI-X-99";
            updateDeviceList();
            closeModal();
        } else { alert("Ungültiger oder abgelaufener Code."); }
    }

    function closeModal() {
        generatedCode = ""; 
        clearInterval(countdownInterval);
        clearTimeout(pairingTimer);
        document.getElementById('codeModal').style.display = 'none';
        
        // Wichtig: Alles für das nächste Mal zurücksetzen
        document.getElementById('input-area').style.display = 'block';
        document.getElementById('timer-display').innerText = "";
        document.getElementById('groupCode').value = ""; // Input leeren
        document.getElementById('action-area').innerHTML = originalActionArea;
    }
    
    // Hilfsfunktionen für Listen-Logik
    function leaveGroup() { if(confirm("Gruppe verlassen?")) { isGrouped = false; document.getElementById('mainButton').innerText = "Code eingeben"; updateDeviceList(); } }
    function kickDevice() { if(confirm("Gerät entfernen?")) { isGrouped = false; document.getElementById('mainButton').innerText = "Code eingeben"; updateDeviceList(); } }
</script>
