<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchronisieren</title>
    <!-- Supabase-Client einbinden -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Dein CSS bleibt hier unverändert */
    </style>
</head>
<body>
    <!-- (Dein bisheriges HTML-Layout) -->

    <script>
        // Initialisiere Supabase mit deinen Daten
        const supabase = supabase.createClient(
            'https://kynhrpdxhkjaeeexalje.supabase.co', 
            'sb_publishable_lnmQ267x9hH4sdGN3FZxKg_6INmbnPQ'
        );

        let activeRowId = null; // Speichert die Datenbank-ID des aktuellen Codes

        // 1. Code generieren und in Datenbank schreiben
        async function startPairingProcess() {
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            const expires = new Date(Date.now() + 60000).toISOString();

            const { data, error } = await supabase.from('groups').insert([{ 
                group_key: code, 
                status: 'active', 
                last_active_at: expires 
            }]).select().single();

            if (error) { alert("Verbindungsfehler"); return; }
            activeRowId = data.id;

            // UI-Update (Timer etc. wie in deinem Code)
            document.getElementById('modal-text').innerHTML = "Dein Code:<br><strong style='font-size:2rem; color:#00d4ff;'>" + code + "</strong>";
            document.getElementById('input-area').style.display = 'none';
        }

        // 2. Code validieren (Prüfung in Supabase)
        async function confirmCode() {
            const input = document.getElementById('groupCode').value;
            
            // Suche den Datensatz, der aktiv ist und stimmt
            const { data, error } = await supabase
                .from('groups')
                .select('*')
                .eq('group_key', input)
                .eq('status', 'active')
                .single();

            // Prüfe Gültigkeit und Zeit
            if (data && new Date(data.last_active_at) > new Date()) {
                // Bei Erfolg Status auf 'linked' setzen
                await supabase.from('groups').update({ status: 'linked' }).eq('id', data.id);
                alert("Erfolgreich synchronisiert!");
                closeModal();
            } else {
                alert("Code ungültig oder abgelaufen.");
            }
        }

        // 3. Status beim Abbrechen oder Ablaufen auf 'expired' setzen
        async function updateStatus(newStatus) {
            if (!activeRowId) return;
            await supabase.from('groups').update({ status: newStatus }).eq('id', activeRowId);
        }

        // ... closeModal und restliche Funktionen
    </script>
</body>
</html>
