<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poretto</title>
    <style>
        body { margin: 0; padding-bottom: 90px; background-color: #050505; color: white; font-family: sans-serif; }
        
        .banner {
            position: fixed; top: 0; left: 0; width: 100%; height: 60vh;
            background-image: url('https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_000000006e8871f4a74e47a18c61618d4664144619533045072.png');
            background-size: cover; background-position: center; z-index: -1;
        }

        .banner-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.2); 
        }

        .content {
            margin-top: 45vh; 
            background: linear-gradient(to bottom, rgba(5,5,5,0) 0%, #050505 5%, #050505 100%);
            padding: 20px;
            position: relative;
        }

        /* Video Popup Styling - Jetzt ohne Overlay */
        #video-popup {
            display: none; position: fixed; top: 0; left: 0; width: 100%; 
            height: auto; z-index: 10000; background: transparent;
        }
        #video-container {
            position: relative; width: 100%;
        }
        #close-btn {
            position: absolute; top: 10px; right: 10px; color: white; font-size: 24px; 
            cursor: pointer; z-index: 10001; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px;
        }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background-color: #0a0a0a; display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #333; z-index: 9999; 
        }
        .bottom-nav a { color: #555; text-decoration: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="video-popup">
        <span id="close-btn" onclick="closeVideo()">✕</span>
        <div id="video-container">
            <iframe width="100%" height="250" src="https://www.youtube.com/embed/videoseries?list=PLRaI73il2WqIyi8v53CMK3QgXFTGs67Yh" 
                    frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <div class="banner">
        <div class="banner-overlay"></div>
    </div>

    <div class="content">
        <img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_00000000d13071f49b02e87cff4df2111868918513011359622.png" 
             style="width: 100%; max-width: 225px; display: block; margin: -180px auto -60px auto;">

        <div style="text-align: center;">
            <button onclick="openVideo()" style="display: block; width: 90%; margin: 20px auto; padding: 15px; background: linear-gradient(90deg, #7000ff, #00d4ff); color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer;">▶ Wiedergabe starten</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html">Start</a>
        <a href="stream.html">Stream</a>
        <a href="#">Shop</a>
        <a href="#">Partner</a>
    </nav>

    <script>
        function openVideo() { document.getElementById('video-popup').style.display = 'block'; }
        function closeVideo() { document.getElementById('video-popup').style.display = 'none'; }
    </script>
</body>
</html>
