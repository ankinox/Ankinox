<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poretto</title>
    <style>
        body { margin: 0; padding-bottom: 90px; background-color: #050505; color: white; font-family: sans-serif; }
        
        /* Container für den oberen Bereich, der später durch das Video ersetzt wird */
        #media-top { width: 100%; height: 60vh; position: relative; }

        .banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_000000006e8871f4a74e47a18c61618d4664144619533045072.png');
            background-size: cover; background-position: center; z-index: 1;
        }

        .banner-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.2); z-index: 2;
        }

        /* Das Video nimmt jetzt den Platz des Banners ein */
        #video-embed {
            display: none; width: 100%; height: 100%; z-index: 3;
        }

        .content {
            padding: 20px;
            background-color: #050505;
        }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background-color: #0a0a0a; display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #333; z-index: 9999; 
        }
        .bottom-nav a { color: #555; text-decoration: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="media-top">
        <!-- Banner -->
        <div class="banner">
            <div class="banner-overlay"></div>
        </div>
        <!-- Video wird hier eingebettet -->
        <iframe id="video-embed" src="https://www.youtube.com/embed/videoseries?list=PLRaI73il2WqIyi8v53CMK3QgXFTGs67Yh&autoplay=1" 
                frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="content">
        <img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_00000000d13071f49b02e87cff4df2111868918513011359622.png" 
             style="width: 100%; max-width: 225px; display: block; margin: -100px auto 20px auto; position: relative; z-index: 4;">

        <div style="text-align: center;">
            <div style="color: #bbb; margin-bottom: 10px;">
                <span style="border: 1px solid #7000ff; padding: 4px 12px; border-radius: 8px; font-weight: bold; color: #00d4ff;">FSK 0</span>• Kurzfilm • Drama
            </div>

            <div style="color: #00d4ff; font-size: 30px; margin-bottom: 5px;">★★★☆☆</div>
            <div style="color: white; font-size: 18px; font-weight: bold; margin-bottom: 20px;">Durchschnitt: 3.5</div>

            <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;">
                <button style="background: transparent; color: #00d4ff; border: 2px solid #00d4ff; padding: 12px 35px; border-radius: 50px; font-weight: bold; cursor: pointer;">♥ Favorit</button>
                <button id="share-button" style="background: transparent; color: #bf00ff; border: 2px solid #bf00ff; padding: 12px 35px; border-radius: 50px; font-weight: bold; cursor: pointer;">➔ Teilen</button>
            </div>

            <div style="text-align: left; color: #cccccc; line-height: 1.5; margin-bottom: 30px; font-size: 0.95rem;">
                Poretto ist ein Mädchen, das alleine ist und niemanden hat, bis sie auf einen magischen Stuhl trifft, der ihr verhilft, Freunde zu finden.
            </div>

            <button onclick="playVideo()" style="display: block; width: 90%; margin: 0 auto; padding: 15px; background: linear-gradient(90deg, #7000ff, #00d4ff); color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer;">▶ Wiedergabe starten</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html">Start</a>
        <a href="stream.html">Stream</a>
        <a href="#">Shop</a>
        <a href="#">Partner</a>
    </nav>

    <script>
        function playVideo() {
            // Versteckt Banner, zeigt Video
            document.querySelector('.banner').style.display = 'none';
            document.getElementById('video-embed').style.display = 'block';
        }

        document.getElementById('share-button').addEventListener('click', async () => {
            try { await navigator.share({ title: 'Poretto', url: window.location.href }); } 
            catch (err) { console.log('Teilen abgebrochen'); }
        });
    </script>
</body>
</html>
