<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankinox Shop – Exklusive Fan-Artikel</title>
    
    <meta property="og:image" content="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_000000003d8c71f48076cd973bc171244122624465816296866.png">
    <meta property="og:title" content="Ankinox Shop">
    <meta property="og:description" content="Exklusives Merchandise & Limitierte Editionen.">

    <style>
        /* Farbpalette basierend auf dem Logo-Look und dem Verlauf */
        :root {
            --accent-color: #ff6b6b;
            --bg-color: #050505;
            --button-gradient: linear-gradient(90deg, #d63031 0%, #6c5ce7 100%);
        }

        body { margin: 0; padding-bottom: 90px; background-color: var(--bg-color); color: white; font-family: sans-serif; }
        
        .banner {
            position: fixed; top: 0; left: 0; width: 100%; height: 60vh;
            background-image: url('https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_00000000465071f4b6f088a5c97f5ae94673847233298897158.png');
            background-size: cover; background-position: center; z-index: -1;
        }

        .banner-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 5, 5, 0.4); 
        }

        .content {
            margin-top: 30vh; 
            background: linear-gradient(to bottom, rgba(5,5,5,0) 0%, var(--bg-color) 11.5%, var(--bg-color) 100%);
            padding: 10vh 20px 20px 20px;
            position: relative;
        }

        .category-section { margin-bottom: 40px; }
        .category-title { 
            display: flex; align-items: center; color: var(--accent-color); 
            margin-bottom: 20px; text-transform: uppercase; font-size: 1.2rem;
        }
        .category-title::before {
            content: ""; display: inline-block; width: 4px; height: 25px; 
            background-color: var(--accent-color); margin-right: 10px;
        }
        
        .scroll-container {
            display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px;
            scrollbar-width: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .product-card {
            min-width: 160px; width: 160px; background: #111; border-radius: 15px; padding: 10px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            border: 1px solid var(--accent-color);
        }
        .product-img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; margin-bottom: 10px; }
        .product-name { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        
        .product-btn { 
            display: inline-block; margin-top: 10px; padding: 8px 15px; 
            background: var(--button-gradient); color: white; text-decoration: none; border-radius: 20px; 
            font-size: 0.8rem; font-weight: bold; border: none;
        }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background-color: #0a0a0a; display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #333; z-index: 9999; 
        }
        .bottom-nav a { color: #555; text-decoration: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="banner"><div class="banner-overlay"></div></div>

    <div class="content">
        <img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_000000003d8c71f48076cd973bc171244122624465816296866.png" 
             style="width: 100%; max-width: 275px; display: block; margin: -130px auto -100px auto;">

        <div style="text-align: center;">
            <p style="color: #bbb; margin-top: 0; margin-bottom: 35px;">Exklusives Merchandise & Limitierte Editionen.</p>

            <div style="margin-bottom: 35px;">
                <button id="share-button" style="background: transparent; color: var(--accent-color); border: 2px solid var(--accent-color); padding: 12px 35px; border-radius: 50px; font-weight: bold; cursor: pointer;">➔ Teilen</button>
            </div>

            <div class="category-section">
                <h2 class="category-title">Klamotten</h2>
                <div class="scroll-container">
                    <div class="product-card">
                        <img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/screenshot_20260701_111319_samsungbrowser993583346539854004.jpg" class="product-img">
                        <div class="product-name">T-Shirt (M)</div>
                        <a href="https://ankinox-shop.myspreadshop.de/ankinox+logo-A6a44be6cd019d2145062106d?sellable=lNdJgDpv5XTjpE3Xa9Dl-812-7&appearance=1" class="product-btn">Jetzt Kaufen</a>
                    </div>
                    <div class="product-card">
                        <img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/screenshot_20260701_112056_samsungbrowser3192014083057506429.jpg" class="product-img">
                        <div class="product-name">T-Shirt (W)</div>
                        <a href="https://ankinox-shop.myspreadshop.de/ankinox+logo-A6a44be6cd019d2145062106d?sellable=lNdJgDpv5XTjpE3Xa9Dl-813-8&appearance=1269" class="product-btn">Jetzt Kaufen</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html">Start</a>
        <a href="stream.html">Stream</a>
        <a href="Shop.html" style="color: #bf00ff;">Shop</a>
        <a href="Partnerschaft.html">Partner</a>
    </nav>

    <script>
        document.getElementById('share-button').addEventListener('click', async () => {
            try {
                await navigator.share({ title: 'Ankinox Shop', url: window.location.href });
            } catch (err) { console.log('Teilen abgebrochen', err); }
        });
    </script>
</body>
</html>
