<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankinox</title>
    <style>
        body { margin: 0; padding-bottom: 90px; background-color: #000; color: white; font-family: sans-serif; }
        
        /* Container für den Header-Bereich */
        .header-hero { 
            width: 100%; position: relative; 
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.8) 90%, rgba(0,0,0,1) 100%), 
            url('https://ankinox.wordpress.com/wp-content/uploads/2026/06/file_00000000111071f4924b6cba720793265390065964046614069.png');
            background-size: cover; background-repeat: no-repeat; background-position: top center; 
            min-height: 150px; 
            /* Hier angepasst: Oben 5px, rechts 20px, unten 20px, links 20px */
            padding: 5px 20px 20px 20px; 
            box-sizing: border-box;
        }

        /* Logo-Positionierung */
        .logo { 
            width: 100px; height: auto; display: block; 
        }

        /* Feste Navigationsleiste */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background-color: #0a0a0a; display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #333; z-index: 9999; 
        }
        .bottom-nav a { color: #555; text-decoration: none; font-size: 1.2rem; }
        .bottom-nav a.active { color: #bf00ff; }
    </style>
</head>
<body>

    <div class="header-hero">
        <img src="https://ankinox.wordpress.com/wp-content/uploads/2026/06/file_00000000fae07246aee954a7e9b9ef573991694793848018843.png" 
             alt="Ankinox Logo" class="logo">
    </div>
    
    <nav class="bottom-nav">
        <a href="#" class="active">Start</a>
        <a href="stream.html">Stream</a>

        <a href="#">Partner</a>
    </nav>

</body>
</html>
