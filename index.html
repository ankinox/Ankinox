<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream - Ankinox</title>
    
    <meta property="og:title" content="Ankinox">
    <meta property="og:description" content="Schaue dir Filme, Musik und Serien auf Ankinox an.">
    <meta property="og:image" content="https://ankinox.wordpress.com/wp-content/uploads/2026/06/img-20260613-wa00645601319322933086557.jpg">
    <meta property="og:url" content="https://ankinox.github.io/"> 
    <meta property="og:type" content="website">

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; padding-bottom: 90px; background-color: #050505; color: white; font-family: sans-serif; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 9999; }
        .bottom-nav a { color: #555; text-decoration: none; font-size: 1.2rem; }
        .dot { flex: 1; height: 5px; background: rgba(255,255,255,0.4); border-radius: 2.5px; overflow: hidden; position: relative; cursor: pointer; }
        .dot.active { cursor: default; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #7000ff, #00d4ff); position: absolute; top: 0; left: 0; pointer-events: none; }
        .scroll-container { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 10px; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }
        @keyframes load { from { width: 0%; } to { width: 100%; } }
    </style>
</head>
<body>

    <div id="banner-container" style="position:relative; width:100%; height:60vh; overflow:hidden">
        <img id="banner-bg" src="" style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1">
        <div style="position:absolute;bottom:0;left:0;right:0;height:100%;background:linear-gradient(to top,#050505 0%,transparent 60%);z-index:2"></div>
        <div style="position:absolute;top:0;left:0;z-index:10;padding:15px; margin-top: -20px;">
            <img src="https://ankinox.wordpress.com/wp-content/uploads/2026/06/file_00000000fae07246aee954a7e9b9ef573991694793848018843.png" style="width: 100px;">
        </div>
        <div style="position:absolute; bottom:1px; left:30px; z-index:3; max-width:500px">
            <img id="banner-logo" src="" style="display: block; width: 100%; max-width: 150px; margin-left: -20px; margin-bottom: -70px">
            <div id="banner-fsk" style="color:#bbb;font-size:13px;margin-bottom:12px"></div>
            <p id="banner-desc" style="font-size:14px;margin-bottom:15px;opacity:0.9;line-height:1.4;max-width:90%"></p>
            <div style="display:flex; gap:10px; align-items:center; position:relative; z-index:101">
                <a id="banner-button-link" href="#" style="padding: 8px 20px; color: #ffffff; text-decoration: none; border-radius: 50px; font-weight: bold; display: inline-flex; align-items: center; white-space: nowrap">▶ Anschauen</a>
            </div>
        </div>
    </div>

    <div style="width:100%; background-color:#050505; padding:20px 30px; box-sizing: border-box;">
        <div id="indicator-box" style="display:flex; gap:10px; width:150px;"></div>
    </div>

    <div style="background-color: #050505; color: white; padding: 10px 30px; font-family: sans-serif;">
        <h2 style="font-size: 20px; margin-bottom: 15px">Mehr entdecken</h2>
        <div class="scroll-container" id="ankinox-carousel">
            <div style="flex: 0 0 140px">
                <a href="Kanalmitgliedschaft.html"><img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_00000000741871f49fad164dffb4c4992147124538725298076.png" style="width: 140px; height: 200px; object-fit: cover; border-radius: 8px; border: none;"></a>
                <p style="font-size: 14px; margin: 10px 0 5px 0; font-weight: bold; white-space: nowrap;">Mitgliedschaft</p>
                <p style="font-size: 12px; color: #bbb">Vorteile | Exklusiv</p>
            </div>
            <div style="flex: 0 0 140px">
                <a href="Shop.html"><img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_00000000465071f4b6f088a5c97f5ae94673847233298897158.png" style="width: 140px; height: 200px; object-fit: cover; border-radius: 8px; border: none;"></a>
                <p style="font-size: 14px; margin: 10px 0 5px 0; font-weight: bold; white-space: nowrap;">Ankinox Shop</p>
                <p style="font-size: 12px; color: #bbb">Merchandise | Exklusiv</p>
            </div>
            <div style="flex: 0 0 140px">
                <a href="Partnerschaft.html"><img src="https://ankinox.wordpress.com/wp-content/uploads/2026/07/lv_0_202607061608551723013789651408983.jpg" style="width: 140px; height: 200px; object-fit: cover; border-radius: 8px; border: none;"></a>
                <p style="font-size: 14px; margin: 10px 0 5px 0; font-weight: bold; white-space: nowrap;">Partnerschaft mit An..</p>
                <p style="font-size: 12px; color: #bbb">Partnerschaft | Ankinox</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" style="color: #bf00ff">Start</a>
        <a href="stream.html">Stream</a>
        <a href="Shop.html">Shop</a>
        <a href="Partnerschaft.html">Partner</a>
    </nav>

    <script>
        const data = [
            { bg: "https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_00000000741871f49fad164dffb4c4992147124538725298076.png", logo: "https://ankinox.wordpress.com/wp-content/uploads/2026/07/lv_0_202607090240148567443699929004634.png", fsk: '<span style="border:2px solid #ffd700;padding:1px 6px;border-radius:4px;font-weight:bold;color:#ffd700;box-shadow:0 0 5px #ffd700">Mitgliedschaft</span> Exklusive Vorteile', desc: "Profitiere von exklusiven Vorteilen und schalte die komplette Serien-Bibliothek frei.", url: "Kanalmitgliedschaft.html", btnColor: "linear-gradient(90deg, #ffd700, #ff8c00)" },
            { bg: "https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_00000000465071f4b6f088a5c97f5ae94673847233298897158.png", logo: "https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_000000003d8c71f48076cd973bc171244122624465816296866.png", fsk: '<span style="border:2px solid #ff4500;padding:1px 6px;border-radius:4px;font-weight:bold;color:#ff4500;box-shadow:0 0 5px #ff4500">Shop</span> Merchandise • Exklusiv • Fanartikel', desc: "Entdecke exklusive Fan-Artikel und limitierte Editionen im offiziellen Ankinox Shop.", url: "Shop.html", btnColor: "linear-gradient(90deg, #ff4500, #ff0000)" },
            { bg: "https://ankinox.wordpress.com/wp-content/uploads/2026/07/lv_0_202607061608551723013789651408983.jpg", logo: "https://ankinox.wordpress.com/wp-content/uploads/2026/07/file_00000000035871f499d3f138bff8e98b379938916723128019.png", fsk: '<span style="border:2px solid #7000ff;padding:1px 6px;border-radius:4px;font-weight:bold;color:#00d4ff;box-shadow:0 0 5px #00d4ff">Partnerschaft</span> Geldverdienen • Großwerden', desc: "Werde jetzt Ankinox Partner.", url: "Partnerschaft.html", btnColor: "linear-gradient(90deg, #7000ff, #00d4ff)" }
        ];

        const indicatorBox = document.getElementById('indicator-box');
        data.forEach((_, i) => { indicatorBox.innerHTML += `<div class="dot" onclick="manualUpdate(${i})" id="dot-${i}"><div class="progress-bar" id="bar-${i}"></div></div>`; });

        let idx = 0;
        let timer = setInterval(autoUpdate, 5000);
        function autoUpdate() { updateBanner((idx + 1) % data.length); }
        function manualUpdate(i) { clearInterval(timer); updateBanner(i); timer = setInterval(autoUpdate, 5000); }
        function updateBanner(i) {
            idx = i;
            document.getElementById('banner-bg').src = data[idx].bg;
            document.getElementById('banner-logo').src = data[idx].logo;
            document.getElementById('banner-fsk').innerHTML = data[idx].fsk;
            document.getElementById('banner-desc').innerText = data[idx].desc;
            document.getElementById('banner-button-link').href = data[idx].url;
            document.getElementById('banner-button-link').style.background = data[idx].btnColor;
            document.querySelectorAll('.dot').forEach((dot, index) => dot.classList.toggle('active', index === idx));
            document.querySelectorAll('.progress-bar').forEach((bar, index) => {
                bar.style.animation = 'none'; bar.style.width = '0%';
                if (index === idx) setTimeout(() => { bar.style.animation = 'load 5s linear forwards'; }, 50);
            });
        }
        updateBanner(0);

        const carousel = document.getElementById('ankinox-carousel');
        let scrollTimer, resumeTimer;
        let isManual = false;

        function cloneFirstToEnd() {
            if (carousel.children.length > 0 && carousel.children.length < 4) {
                carousel.appendChild(carousel.firstElementChild.cloneNode(true));
            }
        }

        function startCarousel() {
            isManual = false;
            cloneFirstToEnd();
            scrollTimer = setInterval(() => {
                carousel.scrollLeft += 1;
                if (carousel.scrollLeft >= 160) {
                    if (carousel.children.length > 1) carousel.removeChild(carousel.firstElementChild);
                    carousel.scrollLeft = 0;
                    cloneFirstToEnd();
                }
            }, 30);
        }

        startCarousel();

        carousel.addEventListener('touchstart', () => { 
            isManual = true;
            clearInterval(scrollTimer); 
            clearTimeout(resumeTimer); 
        });
        
        carousel.addEventListener('scroll', () => {
            if (isManual && carousel.scrollLeft >= 160) {
                if (carousel.children.length > 1) {
                    carousel.removeChild(carousel.firstElementChild);
                    carousel.scrollLeft = 0;
                }
            }
        });

        carousel.addEventListener('touchend', () => { 
            resumeTimer = setTimeout(() => {
                startCarousel();
            }, 3000); 
        });
    </script>
</body>
</html>
