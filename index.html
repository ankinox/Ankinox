        const carousel = document.getElementById('ankinox-carousel');
        let scrollTimer, resumeTimer;

        function startCarousel() {
            scrollTimer = setInterval(() => {
                if (carousel.scrollLeft >= 160) {
                    carousel.appendChild(carousel.firstElementChild);
                    carousel.scrollLeft = 0;
                } else {
                    carousel.scrollLeft += 1;
                }
            }, 30);
        }
        startCarousel();

        carousel.addEventListener('touchstart', () => { clearInterval(scrollTimer); clearTimeout(resumeTimer); });
        carousel.addEventListener('touchend', () => { resumeTimer = setTimeout(startCarousel, 3000); });
